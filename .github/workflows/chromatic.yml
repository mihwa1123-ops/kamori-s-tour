name: Chromatic

on:
  push:
    branches: [main]
  pull_request:

jobs:
  chromatic:
    name: Visual regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Chromatic 은 baseline 비교를 위해 git history 가 필요
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          # GitHub Secrets 에 CHROMATIC_PROJECT_TOKEN 등록 필수
          # https://www.chromatic.com → 프로젝트 → Manage → Project token
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          autoAcceptChanges: main
          exitZeroOnChanges: true
          onlyChanged: true
